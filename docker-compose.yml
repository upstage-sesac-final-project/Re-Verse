# Re:Verse - 로컬 개발용 (백엔드 + 프론트 개발서버)
# 프론트엔드는 로컬 개발용, 실제 배포는 Vercel 사용
# 사용: docker compose up -d

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      # 개발 중 코드 변경 시 반영을 위한 볼륨 (선택사항)
      - ./app/backend:/app/app/backend
      - ./agent:/app/agent
      - ./shared:/app/shared
    restart: unless-stopped

  # 프론트엔드 개발 서버 (선택사항 - 로컬에서 함께 띄우고 싶을 때만)
  frontend-dev:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      # 개발 중 코드 변경 시 반영을 위한 볼륨
      - ./app/frontend/src:/app/src
      - ./app/frontend/public:/app/public
    depends_on:
      - backend
    profiles:
      - full-dev  # 'docker compose --profile full-dev up'으로만 실행됨
