# Re-Verse CI 워크플로우
#
# dev 브랜치로 향하는 PR 및 dev 브랜치 push 시 실행됩니다.
# Backend (FastAPI/Python 3.12.10/uv) + Frontend (React/Vite) 검사를 병렬 수행합니다.
#
# 검사 항목:
#   Backend  - ruff lint, mypy type check, pytest
#   Frontend - ESLint, Vite build check
#
# 필요한 GitHub Secrets: 없음 (CI 단계에서는 시크릿 불필요)

name: Re-Verse CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # =========================================================
  # Job 1: Backend CI (FastAPI / Python 3.12 / uv)
  # =========================================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12.10"

      - name: Set up Python
        run: uv python install 3.12.10

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app/backend agent
        continue-on-error: true  # 초기 단계에서는 경고로만

      - name: Run tests (pytest)
        run: uv run pytest app/backend/tests agent/tests -v --tb=short
        continue-on-error: true  # 테스트 파일이 채워지기 전까지 경고로만

  # =========================================================
  # Job 2: Frontend CI (React / Vite)
  # =========================================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build check (Vite)
        run: npm run build

  # =========================================================
  # Job 3: CI 결과 요약 (PR 코멘트)
  # =========================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Post CI result to PR
        uses: actions/github-script@v7
        with:
          script: |
            const backend = '${{ needs.backend.result }}';
            const frontend = '${{ needs.frontend.result }}';

            const icon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';

            const body = [
              '## Re-Verse CI 결과',
              '',
              `| 항목 | 결과 |`,
              `|------|------|`,
              `| Backend (ruff / mypy / pytest) | ${icon(backend)} ${backend} |`,
              `| Frontend (ESLint / Vite build) | ${icon(frontend)} ${frontend} |`,
              '',
              `> Commit: \`${{ github.sha }}\` | Branch: \`${{ github.head_ref }}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
